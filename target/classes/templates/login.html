<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Student LMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <a class="auth-back" href="/">&#8592; Back to home</a>
    <div class="auth-card">
        <div class="auth-logo">&#127979;</div>
        <h1 class="auth-title">Sign in to LMS</h1>
        <p class="auth-sub">Choose a demo account or enter your credentials below.</p>

        <div class="quick-fills">
            <button class="qf-btn qf-admin" onclick="fill('admin@lms.com','admin123')">&#128737; Admin</button>
            <button class="qf-btn qf-instructor" onclick="fill('instructor@lms.com','teach123')">&#128196; Instructor</button>
            <button class="qf-btn qf-student" onclick="fill('student@lms.com','learn123')">&#127891; Student</button>
        </div>

        <div class="auth-divider"><span>or enter manually</span></div>

        <div id="auth-error" class="auth-alert hidden"></div>

        <form id="login-form" autocomplete="off">
            <div class="form-field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Sign in</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="/register" class="auth-link">Create one</a></p>
    </div>
</div>

<script>
    function fill(email, password) {
        document.getElementById('email').value = email;
        document.getElementById('password').value = password;
        document.getElementById('auth-error').classList.add('hidden');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const errDiv = document.getElementById('auth-error');
        btn.textContent = 'Signing in…';
        btn.disabled = true;
        errDiv.classList.add('hidden');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Invalid credentials. Please try again.');
            sessionStorage.setItem('lmsUser', JSON.stringify(data));
            const role = data.role;
            if (role === 'ADMINISTRATOR') location.href = '/dashboard/admin';
            else if (role === 'INSTRUCTOR') location.href = '/dashboard/instructor';
            else location.href = '/dashboard/student';
        } catch (err) {
            errDiv.textContent = err.message;
            errDiv.classList.remove('hidden');
            btn.textContent = 'Sign in';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
